name = "dephethogo-access"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# OpenNext Cloudflare configuration
# No [site] or [build] needed for most OpenNext setups as they are handled by the adapter.

# For any public environment variables:
[vars]
NEXT_PUBLIC_APP_URL = "https://dephethogo-access.pages.dev"

# Note: Secret variables like DATABASE_URL and JWT_SECRET 
# MUST be set directly in the Cloudflare Pages Dashboard under
# Settings > Environment Variables. Do NOT commit them here!
